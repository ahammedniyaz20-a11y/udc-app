<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UDC — Udyawar Dammam Committee</title>
<style>
/* ═══════════════════════════════════════════════
   NOOR DESIGN SYSTEM — UDC
   Primary:   #1B3C53  (Deep Teal)
   Accent:    #E9762B  (Warm Orange)
   BG:        #F5F5F0  (Off White)
   Surface:   #FFFFFF
   Card:      #E6D8C3  (Warm Cream)
   Text:      #452829  (Dark Brown)
   Muted:     #9A8678  (Warm Gray)
   Success:   #5D866C  (Muted Green)
   Danger:    #A03A13  (Deep Red)
   Border:    #A1C2BD  (Light Sage)
═══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#1B3C53;
  --pri-dk:#132C3E;
  --pri-lt:#D4E4EE;
  --acc:#E9762B;
  --acc-lt:#FBE9D6;
  --bg:#F5F5F0;
  --surface:#FFFFFF;
  --card:#E6D8C3;
  --card-lt:#F0E8DB;
  --text:#452829;
  --muted:#9A8678;
  --ok:#5D866C;
  --ok-lt:#D6EAD9;
  --danger:#A03A13;
  --danger-lt:#F2DDD5;
  --border:#A1C2BD;
  --border-lt:#D9E8E6;
  --sage:#A1C2BD;
  --navy:#30364F;

  --r:10px;
  --r-lg:16px;
  --r-xl:20px;
  --shadow:0 1px 4px rgba(27,60,83,0.10);
  --shadow-md:0 4px 16px rgba(27,60,83,0.12);
  --shadow-lg:0 8px 32px rgba(27,60,83,0.16);

  --nav-h:64px;
  --top-h:56px;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
  min-height:100vh;min-height:100dvh;
}

/* ── Utilities ── */
.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-4{gap:4px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.text-muted{color:var(--muted)}
.fw-600{font-weight:600}.fw-500{font-weight:500}
.w-full{width:100%}.text-center{text-align:center}
.text-right{text-align:right}
.text-ok{color:var(--ok)}.text-danger{color:var(--danger)}
.text-acc{color:var(--acc)}.text-pri{color:var(--pri)}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#login-screen{
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  background:var(--pri);
  padding:24px;
}
.login-card{
  background:var(--surface);
  border-radius:var(--r-xl);
  padding:40px 36px;
  width:100%;max-width:380px;
  box-shadow:var(--shadow-lg);
}
.login-top{text-align:center;margin-bottom:36px}
.login-badge{
  width:72px;height:72px;
  background:var(--pri);
  border-radius:18px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:#fff;
  letter-spacing:1px;
  margin-bottom:16px;
  box-shadow:0 4px 16px rgba(27,60,83,0.3);
}
.login-org{font-size:17px;font-weight:700;color:var(--pri)}
.login-tagline{font-size:12px;color:var(--muted);margin-top:4px}

.pin-field{
  text-align:center;
  font-size:32px;
  letter-spacing:10px;
  font-weight:700;
  border:2px solid var(--border);
  border-radius:var(--r);
  padding:16px;
  color:var(--pri);
  background:var(--bg);
  width:100%;
  transition:border-color .2s,box-shadow .2s;
}
.pin-field:focus{
  outline:none;
  border-color:var(--pri);
  box-shadow:0 0 0 4px rgba(27,60,83,0.1);
  background:#fff;
}
.login-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
.login-err{
  background:var(--danger-lt);color:var(--danger);
  border-radius:var(--r);padding:10px 14px;
  font-size:13px;margin-top:12px;text-align:center;
  border:1px solid rgba(160,58,19,0.2);
}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app{display:none;min-height:100vh;min-height:100dvh;flex-direction:column}

/* ── Top bar (desktop) ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--pri);
  height:var(--top-h);
  display:flex;align-items:center;
  padding:0 20px;
  gap:12px;
  box-shadow:0 2px 8px rgba(27,60,83,0.2);
}
.topbar-brand{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;flex-shrink:0;
  text-decoration:none;
}
.topbar-logo{
  width:36px;height:36px;
  background:var(--acc);
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  letter-spacing:.5px;flex-shrink:0;
}
.topbar-name{
  font-size:14px;font-weight:700;color:#fff;
  white-space:nowrap;
}
.topbar-name span{font-weight:400;color:rgba(255,255,255,.55);font-size:11px;display:block}

/* ── Tab nav (desktop top, mobile bottom) ── */
.tab-nav{
  display:flex;align-items:center;gap:2px;
  flex:1;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0 4px;
}
.tab-nav::-webkit-scrollbar{display:none}
.tab-item{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;
  border-radius:8px;
  color:rgba(255,255,255,.6);
  cursor:pointer;
  font-size:13px;font-weight:500;
  white-space:nowrap;
  transition:all .15s;
  user-select:none;
  border:none;background:transparent;
  text-decoration:none;
}
.tab-item:hover{color:#fff;background:rgba(255,255,255,.1)}
.tab-item.active{color:#fff;background:rgba(233,118,43,.25);
  border:1px solid rgba(233,118,43,.4)}
.tab-item .tab-icon{font-size:16px}

.topbar-end{
  display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto
}
.user-chip{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.1);
  border-radius:8px;
  padding:6px 12px;
  cursor:pointer;
  transition:background .15s;
  border:1px solid rgba(255,255,255,.12);
}
.user-chip:hover{background:rgba(255,255,255,.18)}
.user-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);flex-shrink:0}
.user-label{font-size:12px;font-weight:500;color:#fff}
.logout-icon{font-size:14px;color:rgba(255,255,255,.5)}

/* ── Offline bar ── */
#offline-bar{
  background:var(--danger);color:#fff;
  text-align:center;padding:7px 16px;
  font-size:12px;font-weight:500;display:none;
}

/* ── Page wrap ── */
.page-wrap{
  flex:1;
  overflow-y:auto;
  padding:20px 20px 100px;/* bottom padding for mobile nav */
  max-width:1100px;
  margin:0 auto;
  width:100%;
}

/* ── Bottom nav (mobile only) ── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--pri);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  box-shadow:0 -2px 12px rgba(27,60,83,0.2);
}
.bottom-nav-inner{display:flex;align-items:center;justify-content:space-around}
.bnav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 12px;
  color:rgba(255,255,255,.5);
  cursor:pointer;
  font-size:10px;font-weight:500;
  transition:color .15s;
  background:none;border:none;
  min-width:48px;
}
.bnav-item.active{color:var(--acc)}
.bnav-item .bicon{font-size:20px}

/* Floating pay button */
#fab{
  position:fixed;bottom:80px;right:20px;z-index:300;
  width:52px;height:52px;
  background:var(--acc);
  border-radius:50%;
  display:none;
  align-items:center;justify-content:center;
  font-size:24px;
  box-shadow:0 4px 16px rgba(233,118,43,.4);
  cursor:pointer;border:none;color:#fff;
  transition:transform .15s,box-shadow .15s;
}
#fab:active{transform:scale(.94)}
#fab-desktop{
  position:fixed;bottom:28px;right:28px;z-index:300;
  display:none;
  align-items:center;gap:8px;
  background:var(--acc);
  border-radius:28px;
  padding:12px 20px;
  font-size:14px;font-weight:600;color:#fff;
  box-shadow:0 4px 20px rgba(233,118,43,.35);
  cursor:pointer;border:none;
  transition:transform .15s,box-shadow .15s;
}
#fab-desktop:active{transform:scale(.97)}

/* ══════════════════════════════════════
   CARDS & SURFACES
══════════════════════════════════════ */
.card{
  background:var(--surface);
  border:1px solid var(--border-lt);
  border-radius:var(--r-lg);
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.card-cream{
  background:var(--card-lt);
  border-color:var(--border);
}
.card-title{
  font-size:13px;font-weight:700;color:var(--pri);
  margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
  text-transform:uppercase;letter-spacing:.06em;
}
.card-title-icon{font-size:16px}
.section-label{
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:10px;
}
.divider{height:1px;background:var(--border-lt);margin:14px 0}

/* ══════════════════════════════════════
   KPI STRIP
══════════════════════════════════════ */
.kpi-strip{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:16px;
}
.kpi{
  background:var(--surface);
  border:1px solid var(--border-lt);
  border-radius:var(--r-lg);
  padding:16px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.kpi::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--kpi-bar,var(--border));
}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:700;line-height:1;color:var(--kpi-color,var(--text))}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}

/* ══════════════════════════════════════
   PILLS & BADGES
══════════════════════════════════════ */
.pill{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:20px;white-space:nowrap;
}
.pill-ok{background:var(--ok-lt);color:var(--ok)}
.pill-danger{background:var(--danger-lt);color:var(--danger)}
.pill-acc{background:var(--acc-lt);color:var(--acc)}
.pill-pri{background:var(--pri-lt);color:var(--pri)}
.pill-muted{background:var(--card);color:var(--muted)}
.overdue-badge{
  background:var(--danger);color:#fff;
  font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:20px;
  white-space:nowrap;
}

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:6px;padding:9px 18px;
  border-radius:var(--r);
  font-size:13px;font-weight:600;
  cursor:pointer;
  border:1.5px solid var(--border);
  background:var(--surface);color:var(--text);
  transition:all .15s;white-space:nowrap;
  text-decoration:none;
}
.btn:hover{background:var(--bg);border-color:var(--muted)}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:var(--pri);color:#fff;border-color:var(--pri);
}
.btn-primary:hover{background:var(--pri-dk);border-color:var(--pri-dk)}
.btn-acc{
  background:var(--acc);color:#fff;border-color:var(--acc);
}
.btn-acc:hover{background:#D66820;border-color:#D66820}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#8A2F0F}
.btn-ghost{
  background:transparent;border-color:transparent;color:var(--muted);
}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px}
.btn-icon{padding:7px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ══════════════════════════════════════
   FORMS
══════════════════════════════════════ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:var(--pri)}
.req{color:var(--danger)}
input,select,textarea{
  font-size:14px;padding:10px 13px;
  border-radius:var(--r);
  border:1.5px solid var(--border);
  background:var(--surface);
  color:var(--text);width:100%;
  transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--pri);
  box-shadow:0 0 0 3px rgba(27,60,83,0.1);
}
input.hi{background:var(--pri-lt);border-color:var(--sage)}
select{cursor:pointer}
textarea{resize:vertical;min-height:80px}

/* Live search dropdown */
.live-search-wrap{position:relative}
.live-search-input{width:100%}
.live-search-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:500;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow-md);
  max-height:220px;overflow-y:auto;
}
.lsd-item{
  padding:10px 13px;cursor:pointer;
  font-size:13px;
  border-bottom:1px solid var(--border-lt);
  transition:background .1s;
}
.lsd-item:last-child{border-bottom:none}
.lsd-item:hover,.lsd-item.focused{background:var(--pri-lt)}
.lsd-code{font-weight:700;color:var(--pri);font-size:12px}

/* ══════════════════════════════════════
   TABLES
══════════════════════════════════════ */
.table-wrap{
  overflow-x:auto;
  border-radius:var(--r-lg);
  border:1px solid var(--border-lt);
}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;padding:10px 14px;
  font-size:10px;font-weight:700;color:var(--muted);
  background:var(--bg);
  border-bottom:1px solid var(--border-lt);
  white-space:nowrap;
  text-transform:uppercase;letter-spacing:.06em;
}
td{
  padding:11px 14px;
  border-bottom:1px solid var(--border-lt);
  vertical-align:middle;color:var(--text);
}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(161,194,189,.08)}

/* ══════════════════════════════════════
   SEARCH BAR
══════════════════════════════════════ */
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:10px 14px;
  margin-bottom:14px;
  transition:border-color .15s,box-shadow .15s;
}
.search-bar:focus-within{
  border-color:var(--pri);
  box-shadow:0 0 0 3px rgba(27,60,83,0.08);
}
.search-bar input{
  border:none;background:transparent;padding:0;font-size:14px;
  flex:1;min-width:0;
}
.search-bar input:focus{outline:none;box-shadow:none}
.search-icon{font-size:18px;color:var(--muted);flex-shrink:0}

/* ══════════════════════════════════════
   MEMBER CARDS
══════════════════════════════════════ */
.member-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px;
}
.member-card{
  background:var(--surface);
  border:1.5px solid var(--border-lt);
  border-radius:var(--r-lg);
  padding:16px;
  cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .1s;
  box-shadow:var(--shadow);
}
.member-card:hover{
  border-color:var(--sage);
  box-shadow:var(--shadow-md);
  transform:translateY(-1px);
}
.mc-top{display:flex;align-items:flex-start;gap:12px}
.mc-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--pri-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:var(--pri);
  flex-shrink:0;
}
.mc-name{font-size:14px;font-weight:700;color:var(--pri)}
.mc-meta{font-size:11px;color:var(--muted);margin-top:2px}
.mc-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.mc-bottom{
  margin-top:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.mc-pending-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
.mc-pending-val{font-size:18px;font-weight:700}

/* Progress ring */
.ring-wrap{position:relative;flex-shrink:0}
.ring-text{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;color:var(--pri);
}

/* ══════════════════════════════════════
   PROFILE VIEW
══════════════════════════════════════ */
.profile-header{
  background:var(--pri);
  border-radius:var(--r-xl);
  padding:24px;
  color:#fff;
  margin-bottom:14px;
  position:relative;overflow:hidden;
}
.profile-header::before{
  content:'';
  position:absolute;top:-30px;right:-30px;
  width:140px;height:140px;
  border-radius:50%;
  background:rgba(233,118,43,.15);
}
.ph-top{display:flex;align-items:flex-start;gap:16px}
.ph-avatar{
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:#fff;
  flex-shrink:0;border:2px solid rgba(255,255,255,.3);
}
.ph-name{font-size:18px;font-weight:700;line-height:1.2}
.ph-meta{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px}
.ph-strip{
  display:flex;gap:20px;
  margin-top:20px;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,.15);
  flex-wrap:wrap;
}
.ph-stat{min-width:80px}
.ph-stat-label{font-size:10px;color:rgba(255,255,255,.6);font-weight:600;text-transform:uppercase}
.ph-stat-val{font-size:20px;font-weight:700;color:#fff}
.ph-stat-val.ok{color:#8EC9A0}
.ph-stat-val.danger{color:#FFAA88}
.ph-stat-val.acc{color:#FFCC99}

/* Year accordion */
.year-section{margin-bottom:10px}
.year-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:var(--card-lt);
  border-radius:var(--r);
  cursor:pointer;
  border:1.5px solid var(--border);
  user-select:none;
  transition:background .15s;
}
.year-toggle:hover{background:var(--card)}
.year-toggle-title{font-size:14px;font-weight:700;color:var(--pri)}
.year-toggle-arrow{font-size:12px;color:var(--muted);transition:transform .2s}
.year-toggle.open .year-toggle-arrow{transform:rotate(180deg)}
.year-body{
  display:none;
  padding:14px;
  border:1.5px solid var(--border);
  border-top:none;
  border-radius:0 0 var(--r) var(--r);
  background:var(--surface);
}
.year-body.open{display:block}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.month-cell{
  text-align:center;padding:8px 4px;
  border-radius:8px;font-size:11px;font-weight:600;
  border:1.5px solid transparent;cursor:default;
}
.mc-paid{background:var(--ok-lt);color:var(--ok);border-color:rgba(93,134,108,.2)}
.mc-unpaid{background:var(--danger-lt);color:var(--danger);border-color:rgba(160,58,19,.15)}
.mc-na{background:var(--bg);color:var(--muted)}
.month-cell-lbl{font-size:9px;color:var(--muted);text-align:center;margin-top:2px}

/* ══════════════════════════════════════
   PAYMENT HISTORY ITEMS
══════════════════════════════════════ */
.pay-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;
  border-bottom:1px solid var(--border-lt);
}
.pay-item:last-child{border-bottom:none}
.pay-icon{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.pi-fee{background:var(--pri-lt)}
.pi-don{background:var(--acc-lt)}
.pay-info{flex:1;min-width:0}
.pay-receipt{font-size:12px;font-weight:700;color:var(--pri)}
.pay-detail{font-size:11px;color:var(--muted);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pay-amount{font-size:15px;font-weight:700;flex-shrink:0}
.timer-pill{
  font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:20px;
  background:var(--acc-lt);color:var(--acc);
  margin-left:6px;
}

/* ══════════════════════════════════════
   HOME / ALERTS
══════════════════════════════════════ */
.alert-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px;
  border-radius:var(--r);
  margin-bottom:8px;
  cursor:pointer;
  transition:background .12s;
}
.alert-item:hover{background:var(--bg)}
.alert-dot{
  width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.ad-warn{background:var(--danger-lt)}
.ad-ok{background:var(--ok-lt)}
.ad-info{background:var(--pri-lt)}
.alert-text{flex:1}
.alert-title{font-size:13px;font-weight:600;color:var(--text)}
.alert-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ══════════════════════════════════════
   CITY FILTER CHIPS
══════════════════════════════════════ */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{
  padding:5px 13px;border-radius:20px;
  font-size:12px;font-weight:600;
  cursor:pointer;border:1.5px solid var(--border);
  background:var(--surface);color:var(--muted);
  transition:all .12s;user-select:none;
}
.chip.active{
  background:var(--pri);color:#fff;border-color:var(--pri);
}
.chip:hover:not(.active){background:var(--bg);border-color:var(--sage)}

/* ══════════════════════════════════════
   RECEIPT
══════════════════════════════════════ */
.receipt-box{
  background:var(--bg);

  border-radius:var(--r);
  padding:16px;
  font-size:12px;
  font-family:'Courier New',monospace;
  white-space:pre-wrap;
  max-height:280px;overflow-y:auto;
  color:var(--text);
  line-height:1.8;
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(27,60,83,0.5);
  z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  backdrop-filter:blur(2px);
}
.modal{
  background:var(--surface);
  border-radius:var(--r-xl);
  width:100%;max-width:560px;
  max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
}
.modal-hdr{
  padding:20px 24px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:700;color:var(--pri)}
.modal-close{
  font-size:20px;cursor:pointer;color:var(--muted);

  border-radius:6px;

}
.modal-close:hover{background:var(--bg)}

}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--pri);color:#fff;
  padding:11px 20px;border-radius:var(--r);

}

/* ══════════════════════════════════════

══════════════════════════════════════ */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:inline-block;flex-shrink:0;
}
.spinner-dark{border-color:rgba(27,60,83,.15);border-top-color:var(--pri)}
@keyframes spin{to{transform:rotate(360deg)}}
.page-loader{
  display:flex;align-items:center;justify-content:center;
  padding:60px 20px;flex-direction:column;gap:14px;
  color:var(--muted);font-size:13px;
}

/* Empty state */

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{

}

.bar-lbl{font-size:9px;color:var(--muted)}

/* Collection strip */
.coll-strip{

.cs-val.acc{color:#FFCC99}
.cs-val.ok{color:#8EC9A0}

/* ══════════════════════════════════════

<body>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbwVrlLp5HNs65iA8PE3frDmJSgphr9I0heKYL8yiD0Bp_IW6hmGl0hGcQIbXu6IqFG9/exec";
const SESSION_MS   = 30 * 60 * 1000;
const EDIT_WIN_MS  = 15 * 60 * 1000;
const MONTHS = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];
const CITIES = ["All","Dammam","Jubail","Khobar","Sarrar","Riyadh"];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S = {
  user: null,
  members: [],
  page: "home",
  sessionTimer: null,
};

// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function api(action, data = {}) {
  try {
    const payload = { action, ...data,
      userRole: S.user?.role, userLabel: S.user?.label };
    const params = new URLSearchParams({ data: JSON.stringify(payload) });
    const res = await fetch(API_URL + "?" + params.toString());
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } catch(err) {
    return { ok: false, error: "Connection error. Check internet and try again." };
  }
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastT;
function toast(msg, type="ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show t-" + type;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.className = "", 3200);
}

// ═══════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════
function resetSession() {
  clearTimeout(S.sessionTimer);
  S.sessionTimer = setTimeout(() => {
    toast("Session expired. Sign in again.", "err");
    setTimeout(logout, 1500);
  }, SESSION_MS);
}
document.addEventListener("click", resetSession);
document.addEventListener("keydown", resetSession);

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
async function doLogin() {
  const pin = document.getElementById("pin-input").value.trim();
  const btn = document.getElementById("login-btn");
  const err = document.getElementById("login-err");
  if (!pin) { showLoginErr("Please enter your PIN."); return; }

  btn.innerHTML = '<span class="spinner"></span> Verifying…';
  btn.disabled = true;
  err.classList.add("hidden");

  const res = await api("login", { pin });
  if (res.ok) {
    S.user = { role: res.role, label: res.label };
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    applyRoleUI();
    resetSession();
    await loadMembers();
    navigate("home");
  } else {
    showLoginErr(res.error || "Invalid PIN.");
    document.getElementById("pin-input").value = "";
    document.getElementById("pin-input").focus();
    btn.innerHTML = "Sign In";
    btn.disabled = false;
  }
}

function showLoginErr(msg) {
  const e = document.getElementById("login-err");
  e.textContent = msg; e.classList.remove("hidden");
}

function applyRoleUI() {
  document.getElementById("top-role-label").textContent = S.user.label;
  const role = S.user.role;

  // Hide payment + members for search-only
  if (role === "search") {
    ["tnav-payment","bnav-payment","tnav-members","bnav-members"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add("hidden");
    });
    // Hide FABs
    document.getElementById("fab").classList.add("hidden");
    document.getElementById("fab-desktop").classList.add("hidden");
  }
  // Show audit + settings for admin
  if (role === "admin") {
    document.getElementById("tnav-audit").classList.remove("hidden");
    document.getElementById("tnav-settings").classList.remove("hidden");
    // Add to bottom nav
    const bnav = document.getElementById("bnav-inner");
    const settingsBtn = document.createElement("button");
    settingsBtn.className = "bnav-item";
    settingsBtn.setAttribute("data-page","settings");
    settingsBtn.onclick = () => navigate("settings");
    settingsBtn.innerHTML = '<span class="bicon">⚙️</span>Settings';
    bnav.appendChild(settingsBtn);
  }
}

function confirmLogout() {
  if (confirm("Sign out of UDC?")) logout();
}

function logout() {
  S.user = null;
  clearTimeout(S.sessionTimer);
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("pin-input").value = "";
  document.getElementById("login-err").classList.add("hidden");
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
async function navigate(page) {
  const role = S.user?.role;
  if (role === "search" && ["payment","members","audit","settings"].includes(page)) {
    toast("You don't have access to this section.", "err"); return;
  }
  if (role === "pe" && ["audit","settings"].includes(page)) {
    toast("Admin access required.", "err"); return;
  }

  S.page = page;

  // Sync tab nav
  document.querySelectorAll(".tab-item").forEach(el => {
    el.classList.toggle("active", el.dataset.page === page);
  });
  // Sync bottom nav
  document.querySelectorAll(".bnav-item").forEach(el => {
    el.classList.toggle("active", el.dataset.page === page);
  });

  // Hide FAB on payment entry (we're already there)
  const fab = document.getElementById("fab");
  fab.style.display = (page === "payment" || role === "search") ? "none" : "flex";

  setContent('<div class="page-loader"><div class="spinner spinner-dark"></div>Loading…</div>');

  switch(page) {
    case "home":     await renderHome();     break;
    case "payment":  await renderPayment();  break;
    case "members":  await renderMembers();  break;
    case "search":         renderSearch();   break;
    case "monthly":  await renderMonthly();  break;
    case "audit":    await renderAudit();    break;
    case "settings": await renderSettings(); break;
  }
}

// ═══════════════════════════════════════════════════════
// MEMBERS CACHE
// ═══════════════════════════════════════════════════════
async function loadMembers(force=false) {
  if (!force && S.members.length) return;
  const res = await api("getMembers");
  if (res.ok) S.members = res.members;
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function setContent(html) {
  document.getElementById("page-wrap").innerHTML = html;
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fmt(n) {
  return (Number(n)||0).toLocaleString("en-US",{maximumFractionDigits:0});
}

function fmtDate(s) {
  if (!s) return "—";
  try { return new Date(s).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
  catch { return s; }
}

function todayISO() {
  return new Date().toISOString().split("T")[0];
}

function calcPending(m) {
  if (m.pendingBal !== undefined) return m.pendingBal;
  // fallback only if server didn't return pendingBal
  const ji = MONTHS.indexOf(m.joinMonth);
  const mo = ji >= 0 ? 12 - ji : 12;
  return Number(m.openingBal||0) + Number(m.fee) * mo;
}

function initials(name) {
  return (name||"").split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();
}

function getOverdueMonths(m) {
  // rough front-end estimate: months behind
  const ji = MONTHS.indexOf(m.joinMonth);
  const pending = calcPending(m);
  if (!m.fee || pending <= 0) return 0;
  return Math.round(pending / Number(m.fee));
}

// ═══════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════
async function renderHome() {
  const res = await api("getDashboard");
  if (!res.ok) {
    setContent(`<div class="card"><p class="text-danger">Error: ${esc(res.error)}</p></div>`); return;
  }
  const k = res.kpis;
  const now = new Date();
  const curMonth = MONTHS[now.getMonth()];

  // Build alerts
  const overdue = S.members.filter(m => m.status === "Active" && getOverdueMonths(m) >= 2);
  const noContact = S.members.filter(m => m.status === "Active" && !m.contact);
  const alerts = [];
  if (overdue.length)
    alerts.push({icon:"⚠️",cls:"ad-warn",title:`${overdue.length} member${overdue.length>1?"s are":" is"} 2+ months overdue`,sub:"Tap to view unpaid members",action:"navigate('monthly')"});
  if (noContact.length)
    alerts.push({icon:"📵",cls:"ad-warn",title:`${noContact.length} member${noContact.length>1?"s have":" has"} no contact number`,sub:"Tap to update their details",action:"navigate('members')"});
  alerts.push({icon:"💳",cls:"ad-info",title:`Last receipt: ${esc(k.lastReceiptNo)}`,sub:`${esc(k.lastPaymentDate)}`,action:"navigate('payment')"});
  if (k.thisMonthPaid >= k.activeMembers && k.activeMembers > 0)
    alerts.push({icon:"🎉",cls:"ad-ok",title:`All members paid for ${curMonth}!`,sub:"Collection is complete this month",action:""});

  const html = `
<div class="page-hdr">
  <div>
    <div class="page-hdr-title">Good ${greeting()}, ${S.user.label}</div>
    <div class="page-hdr-sub">${new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
  </div>
</div>

<div class="coll-strip">
  <div class="cs-item">
    <div class="cs-label">Total Collected</div>
    <div class="cs-val acc">${fmt(k.grandTotal)}</div>
  </div>
  <div class="cs-item">
    <div class="cs-label">Fees YTD</div>
    <div class="cs-val ok">${fmt(k.totalFees)}</div>
  </div>
  <div class="cs-item">
    <div class="cs-label">Donations</div>
    <div class="cs-val">${fmt(k.totalDonations)}</div>
  </div>
  <div class="cs-item">
    <div class="cs-label">Outstanding</div>
    <div class="cs-val danger">${fmt(k.totalPending)}</div>
  </div>
  <div class="cs-item">

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return "morning";
  if (h < 17) return "afternoon";
  return "evening";
}

function renderBarChart(monthly) {
  const vis = monthly.slice(0,6);
  const max = Math.max(...vis.map(m=>m.fees),1);
  return `<div class="bar-chart">
    ${vis.map(m=>{
      const h = Math.max(4,Math.round((m.fees/max)*72));
      return `<div class="bar-col">
        <div class="bar" style="height:${h}px" title="${m.month}: ${fmt(m.fees)}"></div>
        <div class="bar-lbl">${m.month.substring(0,3)}</div>
      </div>`;
    }).join("")}
  </div>`;
}

// Live search
let lsMembers = [];
function lsFilter(val) {
  const dd = document.getElementById("ls-dropdown");
  if (!val || val.length < 1) { dd.classList.add("hidden"); return; }
  lsMembers = S.members.filter(m => m.status === "Active" &&
    (m.name.toLowerCase().includes(val.toLowerCase()) ||
     m.code.toLowerCase().includes(val.toLowerCase())));
  if (!lsMembers.length) { dd.innerHTML = `<div class="lsd-item text-muted">No members found</div>`; }
  else {
    dd.innerHTML = lsMembers.slice(0,8).map((m,i) =>
      `<div class="lsd-item" onclick="lsSelect('${esc(m.code)}')" data-idx="${i}">
        <span class="lsd-code">${esc(m.code)}</span> — ${esc(m.name)}
        <span class="text-muted text-xs" style="float:right">${esc(m.city)}</span>
      </div>`).join("");
  }
  dd.classList.remove("hidden");
}
function lsShow() {
  const v = document.getElementById("ls-input")?.value;
  if (v && v.length > 0) lsFilter(v);
}
function lsSelect(code) {
  const m = S.members.find(x => x.code === code);
  if (!m) return;
  document.getElementById("ls-input").value = `${m.code} — ${m.name}`;
  document.getElementById("p-member-code").value = m.code;
  document.getElementById("ls-dropdown").classList.add("hidden");
  const info = document.getElementById("selected-member-info");
  document.getElementById("sel-name").textContent = m.name;
  document.getElementById("sel-meta").textContent = `${m.city} · Fee: ${fmt(m.fee)}/mo`;
  info.classList.remove("hidden");
  // Auto-fill amount
  const amtEl = document.getElementById("p-amount");
  if (!amtEl.value) amtEl.value = m.fee;
}
function lsOutsideClick(e) {
  const dd = document.getElementById("ls-dropdown");
  if (dd && !dd.contains(e.target) && e.target.id !== "ls-input") {
    dd.classList.add("hidden");
  }
}
function handleTypeChange(type) {
  const remarks = document.getElementById("p-remarks");
  if (type === "Donation") {
    remarks.value = "Donation - General";
  } else {
    remarks.value = "Monthly Fee";
  }
}

async function savePayment() {
  const memberCode = document.getElementById("p-member-code").value;
  const date       = document.getElementById("p-date").value;
  const type       = document.getElementById("p-type").value;
  const amount     = document.getElementById("p-amount").value;
  const remarks    = document.getElementById("p-remarks").value;

  if (!memberCode) { toast("Please select a member.", "err"); return; }
  if (!date || !amount) { toast("Please fill all required fields.", "err"); return; }

  const btn = document.getElementById("save-btn");
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;

  const res = await api("addPayment", {
    payment: { memberCode, date, type, amount: Number(amount), remarks }
  });

  if (res.ok) {
    toast("Payment saved — " + res.receiptNo, "ok");
    clearPayForm();
    loadRecentPayments();
    loadUnpaidQuick();
    showReceiptModal(res, { memberCode, date, type, amount, remarks });
  } else {
    toast(res.error || "Error saving payment.", "err");
    btn.innerHTML = "💾 Save Payment";
    btn.disabled = false;
  }
}

function clearPayForm() {
  const btn = document.getElementById("save-btn");
  if (btn) { btn.innerHTML = "💾 Save Payment"; btn.disabled = false; }
  const f = id => { const el=document.getElementById(id); if(el) el.value=""; };
  f("ls-input"); f("p-member-code"); f("p-amount");
  const pDate = document.getElementById("p-date");
  if (pDate) pDate.value = todayISO();
  const pType = document.getElementById("p-type");
  if (pType) pType.value = "Membership Fee";
  const pRemarks = document.getElementById("p-remarks");
  if (pRemarks) pRemarks.value = "";
  const info = document.getElementById("selected-member-info");
  if (info) info.classList.add("hidden");
  const dd = document.getElementById("ls-dropdown");
  if (dd) dd.classList.add("hidden");
}

let activeCity = "All";

async function renderMembers() {
  await loadMembers(true);
  const canEdit = ["admin","pe"].includes(S.user.role);

  const html = `
<div class="page-hdr">
  <div>
    <div class="page-hdr-title">Members</div>
    <div class="page-hdr-sub">${S.members.filter(m=>m.status==="Active").length} active members</div>
  </div>
  ${canEdit?`<button class="btn btn-primary" onclick="openAddMember()">+ Add Member</button>`:""}
</div>

<div class="search-bar">
  <span class="search-icon">🔍</span>
  <input id="mem-search" placeholder="Search by name or code…" oninput="filterMems(this.value)">
</div>

<div class="chip-row" id="city-chips">
  ${CITIES.map(c=>`<div class="chip ${c===activeCity?"active":""}" onclick="filterCity('${c}')">${c}</div>`).join("")}
</div>

<div id="mem-grid">${renderMemberCards(S.members)}</div>`;
  setContent(html);
}

function renderMemberCards(members) {
  const filtered = activeCity === "All" ? members : members.filter(m=>m.city===activeCity);
  if (!filtered.length) return `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">No members found</div></div>`;
  return `<div class="member-grid">${filtered.map(m=>{
    const pending  = calcPending(m);
    const overdue  = getOverdueMonths(m);
    const ji       = MONTHS.indexOf(m.joinMonth);
    const mo       = ji >= 0 ? 12 - ji : 12;
   const annualDue = (m.annualDue !== undefined) ? m.annualDue : (Number(m.fee) * mo + Number(m.openingBal || 0));
    const pct = annualDue > 0
      ? Math.min(100, Math.max(0, Math.round((1 - pending / annualDue) * 100)))
      : 100;
    return `
    <div class="member-card" onclick="viewMemberProfile('${esc(m.code)}')">
      <div class="mc-top">
        <div class="mc-avatar">${initials(m.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="mc-name">${esc(m.name)}</div>
          <div class="mc-meta">${esc(m.code)} · ${esc(m.city)} · ${esc(m.joinMonth)}</div>
          <div class="mc-badges">
            <span class="pill ${m.status==="Active"?"pill-ok":"pill-muted"}" style="font-size:10px">${esc(m.status)}</span>
            ${overdue>=2?`<span class="overdue-badge">${overdue}mo overdue</span>`:""}
            ${pending<=0?`<span class="pill pill-ok" style="font-size:10px">✅ Paid</span>`:""}
          </div>
        </div>
        ${renderRing(pct)}
      </div>
      <div class="mc-bottom">
        <div>
          <div class="mc-pending-label">Pending Balance</div>
          <div class="mc-pending-val ${pending>0?"text-danger":pending<0?"text-pri":"text-ok"}">${fmt(pending)}</div>
        </div>
        <div style="display:flex;gap:6px">
          ${["admin","pe"].includes(S.user.role)?`<button class="btn btn-xs btn-acc" onclick="event.stopPropagation();quickPay('${esc(m.code)}')">+ Pay</button>`:""}
          <button class="btn btn-xs" onclick="event.stopPropagation();viewMemberProfile('${esc(m.code)}')">View</button>
        </div>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function renderRing(pct) {
  const r=18,c=2*Math.PI*r,dash=Math.round(pct/100*c);
  const color = pct>=100?"#5D866C":pct>=50?"#E9762B":"#A03A13";
  return `<div class="ring-wrap">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="#E6D8C3" stroke-width="4"/>
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="${color}" stroke-width="4"
        stroke-dasharray="${dash} ${c}" stroke-linecap="round"
        transform="rotate(-90 22 22)"/>
    </svg>
    <div class="ring-text">${pct}%</div>
  </div>`;
}

function filterMems(q) {
  const filtered = q ? S.members.filter(m=>
    m.name.toLowerCase().includes(q.toLowerCase())||
    m.code.toLowerCase().includes(q.toLowerCase())) : S.members;
  document.getElementById("mem-grid").innerHTML = renderMemberCards(filtered);
}

  activeCity = city;

    name:      document.getElementById("m-name").value.trim(),
    city:      document.getElementById("m-city").value,
    contact:   document.getElementById("m-contact").value.trim(),
    fee:       Number(document.getElementById("m-fee").value),
    openingBal:Number(document.getElementById("m-openingbal").value),
    status:    document.getElementById("m-status").value,
    joinMonth: document.getElementById("m-joinmonth").value,
  };
  if (!m.code||!m.name||!m.fee){toast("Fill all required fields.","err");return;}
  const res = await api(isEdit?"editMember":"addMember",{member:m});

  else toast(res.error||"Error.","err");

function buildYearAccordion(payments, m) {
  // Group payments by year
  const byYear = {};
  payments.forEach(p => {
    const yr = p.date ? new Date(p.date.split("-").reverse().join("-")).getFullYear() : 2026;
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(p);
  });
  // Ensure current year exists
  const curYear = new Date().getFullYear();
  if (!byYear[curYear]) byYear[curYear] = [];
  const years = Object.keys(byYear).sort((a,b)=>b-a);

  return years.map(yr => {
    const yPays = byYear[yr];
    const yFees = yPays.filter(p=>p.type==="Membership Fee").reduce((s,p)=>s+Number(p.amount),0);
    const yDon  = yPays.filter(p=>p.type==="Donation").reduce((s,p)=>s+Number(p.amount),0);
    const rows = yPays.length ? yPays.map(p=>`
      <div class="pay-item">
        <div class="pay-icon ${p.type==="Membership Fee"?"pi-fee":"pi-don"}" style="width:28px;height:28px;font-size:12px">
          ${p.type==="Membership Fee"?"💳":"🤲"}
        </div>
        <div class="pay-info">
          <div class="pay-receipt" style="font-size:11px">${esc(p.receiptNo)}</div>
          <div class="pay-detail">${esc(p.date)} · ${esc(p.month)}</div>
        </div>
        <div class="pay-amount ${p.type==="Membership Fee"?"text-pri":"text-acc"}" style="font-size:13px">${fmt(p.amount)}</div>
      </div>`).join("")
      : `<div class="empty-state" style="padding:16px 0"><div class="empty-sub">No payments in ${yr}</div></div>`;
    return `
    <div class="year-section">
      <div class="year-toggle" onclick="toggleYear(this)">
        <div class="year-toggle-title">${yr}
          <span class="text-muted text-xs" style="margin-left:8px">
            Fees: ${fmt(yFees)} · Donations: ${fmt(yDon)}
          </span>
        </div>
        <span class="year-toggle-arrow">▼</span>
      </div>
      <div class="year-body">${rows}</div>
    </div>`;
  }).join("");
}

  body.classList.toggle("open");

function gsFilter(val) {
  const el = document.getElementById("gs-suggestions");
  if (!val || val.length < 2) { el.innerHTML=""; return; }
  const matches = S.members.filter(m=>
    m.name.toLowerCase().includes(val.toLowerCase())||
    m.code.toLowerCase().includes(val.toLowerCase())||
    (m.contact&&m.contact.includes(val))
  ).slice(0,6);
  if (!matches.length) { el.innerHTML="<div class='text-muted text-sm'>No matches</div>"; return; }
  el.innerHTML = `<div class="chip-row">${matches.map(m=>
    `<div class="chip" onclick="gsLoad('${esc(m.code)}')">${esc(m.code)} — ${esc(m.name)}</div>`
  ).join("")}</div>`;
}

async function gsSubmit() {
  const val = document.getElementById("gs-input").value.trim();
  const m = S.members.find(x=>
    x.code.toLowerCase()===val.toLowerCase()||
    x.name.toLowerCase().includes(val.toLowerCase())||
    (x.contact&&x.contact.includes(val)));

  else toast("Member not found.","err");
}

          <tr><th>Code</th><th>Name</th><th>City</th><th>Amount</th><th>Receipt</th></tr>
          ${res.paid.map(p=>`<tr>
            <td><strong>${esc(p.code)}</strong></td>
            <td><a href="#" onclick="gsLoad('${esc(p.code)}');return false" style="color:var(--pri);text-decoration:none;font-weight:600">${esc(p.name)}</a></td>
            <td>${esc(p.city)}</td>
            <td><span class="pill pill-ok">${fmt(p.amount)}</span></td>
            <td class="text-muted text-xs">${esc(p.receiptNo)}</td>
          </tr>`).join("")}
        </table>
      </div>`}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 16px;background:var(--danger-lt);font-size:13px;font-weight:700;color:var(--danger)">
      ❌ Unpaid — ${res.unpaid.length} member${res.unpaid.length!==1?"s":""}
    </div>
    ${res.unpaid.length===0
      ? `<div class="empty-state" style="padding:24px"><div class="empty-icon">🎉</div><div class="empty-text">All members paid for ${curMonth}!</div></div>`
      : `<div class="table-wrap" style="border:none;border-radius:0">
        <table>
          <tr><th>Code</th><th>Name</th><th>City</th><th>Fee</th><th>Pending</th></tr>
          ${res.unpaid.map(p=>`<tr>
            <td><strong>${esc(p.code)}</strong></td>
            <td><a href="#" onclick="gsLoad('${esc(p.code)}');return false" style="color:var(--pri);text-decoration:none;font-weight:600">${esc(p.name)}</a></td>
            <td>${esc(p.city)}</td>
            <td>${fmt(p.fee)}</td>
            <td><span class="pill pill-danger">${fmt(p.pending)}</span></td>
          </tr>`).join("")}
        </table>
      </div>`}
  </div>
</div>`;
  setContent(html);
}

// SETTINGS
// ═══════════════════════════════════════════════════════
async function renderSettings() {
  if (S.user.role !== "admin") {
    setContent('<div class="card"><p class="text-danger">Admin access required.</p></div>'); return;
  }
  const res = await api("getSettings");
  if (!res.ok){setContent(`<p class="text-danger">${esc(res.error)}</p>`);return;}
  const cfg = res.settings;

  setContent(`
<div class="page-hdr">
  <div class="page-hdr-title">Settings</div>
  <div class="page-hdr-sub">Organisation & system configuration</div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div class="card">
    <div class="card-title">🏢 Organisation</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Organisation Name</label>
        <input id="s-orgname" value="${esc(cfg.orgName)}">
      </div>
      <div class="form-group">
        <label>Short Name</label>
        <input id="s-orgshort" value="${esc(cfg.orgShort)}">
      </div>
      <div class="form-group">
        <label>Default Monthly Fee</label>
        <input id="s-fee" type="number" value="${cfg.defaultFee}" min="0">
      </div>
      <div class="form-group">
        <label>Active Year</label>
        <input id="s-year" type="number" value="${cfg.currentYear||new Date().getFullYear()}" min="2020">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔐 Access PINs</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Admin PIN</label>
        <input id="s-adminpin" type="password" value="${esc(cfg.pins.adminPin)}" maxlength="6" placeholder="••••">
      </div>
      <div class="form-group">
        <label>Payment Entry 1</label>
        <input id="s-pe1pin" type="password" value="${esc(cfg.pins.pe1Pin)}" maxlength="6" placeholder="••••">
      </div>
      <div class="form-group">
        <label>Payment Entry 2</label>
        <input id="s-pe2pin" type="password" value="${esc(cfg.pins.pe2Pin)}" maxlength="6" placeholder="••••">
      </div>
      <div class="form-group">
        <label>Search Only 1</label>
        <input id="s-s1pin" type="password" value="${esc(cfg.pins.search1Pin)}" maxlength="6" placeholder="••••">
      </div>
      <div class="form-group form-full">
        <label>Search Only 2</label>
        <input id="s-s2pin" type="password" value="${esc(cfg.pins.search2Pin)}" maxlength="6" placeholder="••••">
      </div>
    </div>
  </div>
</div>

<div class="flex justify-between items-center" style="margin-top:4px">
  <p class="text-xs text-muted">Changes take effect immediately after saving.</p>
  <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
</div>`);
}

async function saveSettings() {
  const settings = {
    orgName:    document.getElementById("s-orgname").value.trim(),
    orgShort:   document.getElementById("s-orgshort").value.trim(),
    defaultFee: Number(document.getElementById("s-fee").value),
    currentYear:Number(document.getElementById("s-year").value),
    pins: {
      adminPin:   document.getElementById("s-adminpin").value.trim(),
      pe1Pin:     document.getElementById("s-pe1pin").value.trim(),
      pe2Pin:     document.getElementById("s-pe2pin").value.trim(),
      search1Pin: document.getElementById("s-s1pin").value.trim(),
      search2Pin: document.getElementById("s-s2pin").value.trim(),
    }
  };
  if (!settings.orgName||!settings.pins.adminPin){toast("Organisation name and Admin PIN required.","err");return;}
  const res = await api("saveSettings",{settings});
  if (res.ok) toast("Settings saved.","ok");
  else toast(res.error||"Error saving.","err");
}

// MODAL
// ═══════════════════════════════════════════════════════
function showModal(title, body, buttons=[]) {
  const btns = buttons.map((b,i)=>
    `<button class="btn ${b.cls||""}" id="mbtn-${i}">${b.label}</button>`).join("");
  document.getElementById("modal-container").innerHTML=`
  <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-hdr">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">Cancel</button>
        ${btns}
      </div>
    </div>
  </div>`;
  buttons.forEach((b,i)=>{
    const el=document.getElementById("mbtn-"+i);
    if(el) el.onclick=b.action;
  });
}

function closeModal(){document.getElementById("modal-container").innerHTML="";}
